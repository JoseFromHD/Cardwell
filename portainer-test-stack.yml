services:
  cardwell-test:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    command:
      - /bin/sh
      - -c
      - |
        python - <<'PY'
        from urllib.request import urlretrieve

        base_url = "https://raw.githubusercontent.com/JoseFromHD/Cardwell/main/"
        for filename in ["index.html", "styles.css", "app.js", "server.py"]:
            urlretrieve(base_url + filename, filename)
        PY
        exec python server.py
    ports:
      - "8091:8080"
    environment:
      PORT: "8080"
      CARDWELL_DATA_DIR: /data
      CARDWELL_ADMIN_USERNAME: admin
      CARDWELL_ADMIN_PASSWORD: "replace-this-with-a-long-test-password"
      CARDWELL_ALLOW_DEFAULT_ADMIN_PASSWORD: "false"
      CARDWELL_COOKIE_SECURE: "false"
    volumes:
      - cardwell_test_data:/data
      - cardwell_test_app:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; json.load(urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=2))"
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  cardwell_test_data:
    name: cardwell_test_data
  cardwell_test_app:
    name: cardwell_test_app
